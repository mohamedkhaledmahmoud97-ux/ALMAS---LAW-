version: '3.8'

services:
  # 1. قاعدة البيانات التشغيلية والذاكرة العرضية (PostgreSQL + pgvector)
  postgres_db:
    image: pgvector/pgvector:pg16
    container_name: almas_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: almas_admin
      POSTGRES_PASSWORD: StrongPassword2026!
      POSTGRES_DB: almas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - almas_network

  # 2. مستودع المتجهات القانونية (Qdrant)
  qdrant_db:
    image: qdrant/qdrant:latest
    container_name: almas_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - almas_network

  # 3. الرسم البياني للاستشهادات القانونية والمواد المرتبطة (Neo4j)
  neo4j_db:
    image: neo4j:latest
    container_name: almas_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/StrongNeo4jPassword2026!
    volumes:
      - neo4j_data:/data
    networks:
      - almas_network

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:

networks:
  almas_network:
    driver: bridge