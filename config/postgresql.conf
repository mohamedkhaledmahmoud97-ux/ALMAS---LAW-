# PostgreSQL Configuration Optimizations for ALMAS LAW
# These settings are optimized for vector search and document processing workloads

# Connection Settings
max_connections = 200
superuser_reserved_connections = 10
tcp_backlog = 2048

# Memory Settings
shared_buffers = 2GB
effective_cache_size = 6GB
maintenance_work_mem = 512MB
work_mem = 10MB
wal_buffers = 16MB

# Query Planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Parallelization
max_worker_processes = 4
max_parallel_workers = 4
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2

# WAL (Write-Ahead Logging)
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
wal_keep_segments = 64

# Checkpoints
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
wal_buffers = 16MB

# Autovacuum
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 10s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# Logging
logging_collector = on
log_directory = pg_log
log_filename = 'postgresql-%a.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on
log_statement = 'all'
log_duration = on
log_min_duration_statement = 1000

# Performance Monitoring
track_activities = on
track_counts = on
track_io_timing = on
track_functions = 'all'

# Extension Loading
shared_preload_libraries = 'pg_stat_statements'

# pgvector specific
# Enable creation of vector indexes
# This is handled by pgvector extension

# Client Connection Defaults
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'
default_text_search_config = 'pg_catalog.english'
